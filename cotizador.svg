<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  
  <!-- Abstract gear/cog shape representing configuration -->
  <circle cx="256" cy="240" r="90" fill="none" stroke="#1e40af" stroke-width="3" opacity="0.3"/>
  <circle cx="256" cy="240" r="60" fill="none" stroke="#1e40af" stroke-width="2" opacity="0.2"/>
  
  <!-- Stylized "C" letter made of stacked bars (representing product layers/steps) -->
  <rect x="140" y="130" width="180" height="28" rx="6" fill="url(#accent)" opacity="0.9"/>
  <rect x="140" y="170" width="140" height="24" rx="6" fill="#3b82f6" opacity="0.6"/>
  <rect x="140" y="206" width="160" height="24" rx="6" fill="#3b82f6" opacity="0.45"/>
  <rect x="140" y="242" width="120" height="24" rx="6" fill="#3b82f6" opacity="0.35"/>
  <rect x="140" y="278" width="150" height="24" rx="6" fill="#3b82f6" opacity="0.5"/>
  <rect x="140" y="314" width="180" height="28" rx="6" fill="url(#accent)" opacity="0.9"/>
  
  <!-- Checkmark accent (representing quotation approved) -->
  <path d="M330 220 L355 250 L400 190" fill="none" stroke="#22c55e" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Price tag accent -->
  <circle cx="380" cy="300" r="22" fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.7"/>
  <text x="380" y="308" text-anchor="middle" font-family="system-ui" font-size="22" font-weight="700" fill="#f59e0b" opacity="0.8">$</text>
  
  <!-- App name -->
  <text x="256" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#f1f5f9" letter-spacing="4">COTIZADOR</text>
</svg>
