    <text x="305" y="200" fill="#94a3b8" font-family="Quicksand, sans-serif" font-size="9">NO CONFORM.</text>
    <text x="305" y="240" fill="#f45572" font-family="Quicksand, sans-serif" font-size="32" font-weight="700">10</text>
    <rect x="390" y="180" width="85" height="80" rx="6" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.3)"/>
